<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 530 150" role="img" aria-label="Быстрая Кошка">
  <defs>
    <clipPath id="c4"><circle cx="75" cy="75" r="56"/></clipPath>
  </defs>

  <!-- Dark navy background -->
  <circle cx="75" cy="75" r="57" fill="#111827"/>

  <!-- ===== CAT: amber, all shapes merge into one silhouette ===== -->
  <g fill="#F59E0B" clip-path="url(#c4)">

    <!-- BODY: wide horizontal torso -->
    <ellipse cx="80" cy="82" rx="34" ry="20"/>

    <!-- HEAD: upper-left, larger -->
    <circle cx="46" cy="63" r="21"/>

    <!-- NECK: extra wide so head and body fully merge -->
    <ellipse cx="63" cy="72" rx="23" ry="19"/>

    <!-- LEFT EAR (outer) -->
    <circle cx="33" cy="46" r="11"/>

    <!-- RIGHT EAR -->
    <circle cx="52" cy="43" r="11"/>

    <!-- RUMP BRIDGE: connects body to back legs smoothly -->
    <ellipse cx="110" cy="74" rx="14" ry="15"/>

    <!-- FRONT LEFT LEG (hanging forward-down) -->
    <ellipse cx="43" cy="100" rx="11" ry="22"/>

    <!-- FRONT RIGHT LEG (slightly offset, small tilt) -->
    <ellipse cx="62" cy="103" rx="11" ry="21" transform="rotate(10,62,103)"/>

    <!-- BACK LEFT LEG: rotate POSITIVE = points upper-right (kicking back) -->
    <ellipse cx="108" cy="64" rx="10" ry="22" transform="rotate(36,108,64)"/>

    <!-- BACK RIGHT LEG: more angled upper-right -->
    <ellipse cx="114" cy="57" rx="9" ry="17" transform="rotate(44,114,57)"/>

  </g>

  <!-- TAIL: filled tapered path curving upper-right from rump -->
  <path d="M 116,87 C 132,70 134,48 122,30 C 120,27 116,27 117,32 C 126,50 124,72 112,85 Z"
        fill="#F59E0B" clip-path="url(#c4)"/>

  <!-- EYES: dark dots on head (left/front side of head) -->
  <circle cx="39" cy="62" r="5" fill="#111827" clip-path="url(#c4)"/>
  <circle cx="52" cy="59" r="5" fill="#111827" clip-path="url(#c4)"/>

  <!-- RING: amber to match cat -->
  <circle cx="75" cy="75" r="57" fill="none" stroke="#F59E0B" stroke-width="2.5"/>

  <!-- ===== TEXT ===== -->

  <text
    x="155" y="56"
    font-family="'Segoe UI', Arial, Helvetica, sans-serif"
    font-size="18" font-weight="600"
    fill="#F59E0B" letter-spacing="6">БЫСТРАЯ</text>

  <text
    x="150" y="108"
    font-family="'Segoe UI', Arial, Helvetica, sans-serif"
    font-size="65" font-weight="900"
    fill="#1B4332" letter-spacing="0">КОШКА</text>

  <text
    x="155" y="127"
    font-family="'Segoe UI', Arial, Helvetica, sans-serif"
    font-size="11" font-weight="500"
    fill="#6B7280" letter-spacing="3.5">КЛУБ АВТОРСКИХ ТУРОВ</text>

</svg>
