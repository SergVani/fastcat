<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 530 148" role="img" aria-label="Быстрая Кошка — авторские туры">
  <defs>
    <clipPath id="kClip">
      <circle cx="75" cy="78" r="57"/>
    </clipPath>
  </defs>

  <!-- ===== LEFT EAR ===== -->
  <polygon points="46,36 57,5 70,29" fill="#1B4332"/>
  <polygon points="50,33 58,11 66,27" fill="#F59E0B"/>

  <!-- ===== RIGHT EAR ===== -->
  <polygon points="80,29 93,5 104,36" fill="#1B4332"/>
  <polygon points="84,27 92,11 100,33" fill="#F59E0B"/>

  <!-- ===== SHADOW ===== -->
  <circle cx="75" cy="81" r="57" fill="#1B433218"/>

  <!-- ===== CIRCLE BACKGROUND ===== -->
  <circle cx="75" cy="78" r="57" fill="#FFFFFF"/>

  <!-- ===== CAT FEATURES ===== -->
  <g clip-path="url(#kClip)">

    <!-- Left eye: amber iris -->
    <ellipse cx="57" cy="73" rx="11" ry="8" fill="#F59E0B"/>
    <!-- Left pupil: vertical slit -->
    <ellipse cx="57" cy="73" rx="3.5" ry="6" fill="#1B4332"/>
    <!-- Left shine -->
    <circle cx="54" cy="70" r="2.5" fill="white"/>

    <!-- Right eye: amber iris -->
    <ellipse cx="93" cy="73" rx="11" ry="8" fill="#F59E0B"/>
    <!-- Right pupil: vertical slit -->
    <ellipse cx="93" cy="73" rx="3.5" ry="6" fill="#1B4332"/>
    <!-- Right shine -->
    <circle cx="90" cy="70" r="2.5" fill="white"/>

    <!-- Nose: small amber diamond -->
    <polygon points="72,84 75,80 78,84 75,87" fill="#F59E0B"/>

    <!-- Mouth -->
    <path d="M 68,88 Q 75,95 82,88" stroke="#1B4332" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- Left whiskers -->
    <g stroke="#BBBBBB" stroke-width="1.5" stroke-linecap="round">
      <line x1="24" y1="79" x2="57" y2="82"/>
      <line x1="22" y1="86" x2="56" y2="86"/>
      <line x1="25" y1="93" x2="58" y2="90"/>
    </g>

    <!-- Right whiskers -->
    <g stroke="#BBBBBB" stroke-width="1.5" stroke-linecap="round">
      <line x1="93" y1="82" x2="126" y2="79"/>
      <line x1="94" y1="86" x2="128" y2="86"/>
      <line x1="92" y1="90" x2="125" y2="93"/>
    </g>

  </g>

  <!-- ===== SPEED LINES (amber, left of circle) ===== -->
  <g stroke="#F59E0B" stroke-width="3.5" stroke-linecap="round" opacity="0.8">
    <line x1="5"  y1="64" x2="15" y2="61"/>
    <line x1="3"  y1="78" x2="14" y2="78"/>
    <line x1="5"  y1="92" x2="15" y2="95"/>
  </g>

  <!-- ===== CIRCLE BORDER ===== -->
  <circle cx="75" cy="78" r="57" fill="none" stroke="#1B4332" stroke-width="2.5"/>

  <!-- ===== TEXT ===== -->

  <!-- "БЫСТРАЯ": small, green, letter-spaced -->
  <text
    x="155" y="57"
    font-family="'Segoe UI', Arial, Helvetica, sans-serif"
    font-size="18" font-weight="600"
    fill="#52B788" letter-spacing="6">БЫСТРАЯ</text>

  <!-- "КОШКА": large, bold, dominant -->
  <text
    x="150" y="113"
    font-family="'Segoe UI', Arial, Helvetica, sans-serif"
    font-size="65" font-weight="900"
    fill="#1B4332" letter-spacing="0">КОШКА</text>

  <!-- Tagline -->
  <text
    x="155" y="131"
    font-family="'Segoe UI', Arial, Helvetica, sans-serif"
    font-size="11" font-weight="500"
    fill="#9CA3AF" letter-spacing="3.5">КЛУБ АВТОРСКИХ ТУРОВ</text>

</svg>
