<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 530 150" role="img" aria-label="Быстрая Кошка — авторские туры">
  <defs>
    <clipPath id="c3">
      <circle cx="75" cy="75" r="56"/>
    </clipPath>
  </defs>

  <!-- ===== DARK CIRCLE BACKGROUND ===== -->
  <circle cx="75" cy="75" r="57" fill="#131D2E"/>

  <!-- ===== CAT SILHOUETTE (all one color, shapes merge into blob) ===== -->
  <g fill="#52B788" clip-path="url(#c3)">

    <!-- HEAD (upper left) -->
    <circle cx="44" cy="63" r="19"/>

    <!-- LEFT EAR (small round bump on head) -->
    <circle cx="33" cy="47" r="9"/>

    <!-- RIGHT EAR -->
    <circle cx="50" cy="44" r="9"/>

    <!-- NECK (bridges head to body) -->
    <ellipse cx="64" cy="72" rx="16" ry="13"/>

    <!-- BODY (main horizontal torso) -->
    <ellipse cx="85" cy="82" rx="33" ry="18"/>

    <!-- FRONT LEFT LEG (hanging down, forward position) -->
    <ellipse cx="46" cy="100" rx="9" ry="19"/>

    <!-- FRONT RIGHT LEG (slightly to the right, small tilt) -->
    <ellipse cx="62" cy="101" rx="9" ry="18" transform="rotate(8,62,101)"/>

    <!-- BACK LEFT LEG (kicking upward-right from rump) -->
    <ellipse cx="108" cy="63" rx="8" ry="19" transform="rotate(-36,108,63)"/>

    <!-- BACK RIGHT LEG (slightly more angled) -->
    <ellipse cx="117" cy="54" rx="7" ry="16" transform="rotate(-48,117,54)"/>

  </g>

  <!-- ===== TAIL (thick curved stroke) ===== -->
  <path d="M 116,84 C 133,67 135,46 121,30"
        stroke="#52B788" stroke-width="11" fill="none"
        stroke-linecap="round" clip-path="url(#c3)"/>

  <!-- ===== EYES (dark dots on head) ===== -->
  <circle cx="38" cy="62" r="5" fill="#131D2E" clip-path="url(#c3)"/>
  <circle cx="51" cy="59" r="5" fill="#131D2E" clip-path="url(#c3)"/>

  <!-- ===== RING ===== -->
  <circle cx="75" cy="75" r="57" fill="none" stroke="#52B788" stroke-width="2.5"/>

  <!-- ===== TEXT ===== -->

  <text
    x="155" y="56"
    font-family="'Segoe UI', Arial, Helvetica, sans-serif"
    font-size="18" font-weight="600"
    fill="#52B788" letter-spacing="6">БЫСТРАЯ</text>

  <text
    x="150" y="108"
    font-family="'Segoe UI', Arial, Helvetica, sans-serif"
    font-size="65" font-weight="900"
    fill="#1B4332" letter-spacing="0">КОШКА</text>

  <text
    x="155" y="127"
    font-family="'Segoe UI', Arial, Helvetica, sans-serif"
    font-size="11" font-weight="500"
    fill="#9CA3AF" letter-spacing="3.5">КЛУБ АВТОРСКИХ ТУРОВ</text>

</svg>
