<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Управление блогом — Быстрая Кошка</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body style="background:#F1F5F9">

<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="admin-sidebar-logo">
      <div class="logo-icon">🐱</div>
      <div class="logo-text">Быстрая Кошка <small>Панель управления</small></div>
    </div>
    <nav class="admin-nav">
      <div class="admin-nav-section">Главное</div>
      <a href="index.html">📊 Дашборд</a>
      <a href="registrations.html">📋 Заявки</a>
      <div class="admin-nav-section">Контент</div>
      <a href="programs.html">🏕️ Программы</a>
      <a href="schedule.html">📅 Расписание</a>
      <a href="blog.html" class="active">📝 Блог</a>
      <div class="admin-nav-section">Сайт</div>
      <a href="../index.html" target="_blank">🌐 Открыть сайт</a>
    </nav>
  </aside>

  <main class="admin-main">
    <div class="admin-topbar">
      <h1>📝 Управление блогом</h1>
      <button class="btn btn-primary btn-sm" onclick="openAddModal()">+ Новая статья</button>
    </div>

    <div class="admin-content">
      <div class="admin-table-container">
        <div class="admin-table-header">
          <h3>Все статьи</h3>
          <input type="text" id="searchInput" class="form-control" style="width:220px;padding:8px 12px" placeholder="Поиск..." oninput="renderBlog()">
        </div>
        <div style="overflow-x:auto">
          <table class="admin-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Иконка</th>
                <th>Заголовок</th>
                <th>Категория</th>
                <th>Дата</th>
                <th>Время чтения</th>
                <th>Статус</th>
                <th>Действия</th>
              </tr>
            </thead>
            <tbody id="blogTable"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="blogModal">
  <div class="modal" style="max-width:640px">
    <div class="modal-header">
      <h3 id="blogModalTitle">Новая статья</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <form id="blogForm">
        <input type="hidden" id="editId">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Заголовок *</label>
            <input type="text" id="bTitle" class="form-control" placeholder="Заголовок статьи" required>
          </div>
          <div class="form-group">
            <label class="form-label">Иконка (emoji)</label>
            <input type="text" id="bEmoji" class="form-control" placeholder="🏃" maxlength="4">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Категория</label>
            <select id="bCategory" class="form-control">
              <option>Советы</option>
              <option>Тренировки</option>
              <option>Направления</option>
              <option>Истории</option>
              <option>Отдых</option>
              <option>Психология</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Время чтения</label>
            <input type="text" id="bReadTime" class="form-control" placeholder="5 мин">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Дата публикации</label>
          <input type="date" id="bDate" class="form-control">
        </div>
        <div class="form-group">
          <label class="form-label">Краткое описание *</label>
          <textarea id="bExcerpt" class="form-control" rows="3" placeholder="Краткое описание статьи..." required></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Текст статьи (HTML или текст)</label>
          <textarea id="bContent" class="form-control" rows="6" placeholder="Полный текст статьи..."></textarea>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <input type="checkbox" id="bPublished" style="width:18px;height:18px;accent-color:var(--green)">
          <label for="bPublished" style="font-weight:600;cursor:pointer">Опубликовать</label>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Отмена</button>
      <button class="btn btn-primary" onclick="savePost()">💾 Сохранить</button>
    </div>
  </div>
</div>

<!-- DELETE -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal" style="max-width:400px">
    <div class="modal-header"><h3>Удалить статью?</h3><button class="modal-close" onclick="closeDeleteModal()">✕</button></div>
    <div class="modal-body"><p>Статья будет безвозвратно удалена.</p></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeDeleteModal()">Отмена</button>
      <button class="btn" style="background:#DC2626;color:#fff" onclick="confirmDelete()">🗑️ Удалить</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="../js/data.js"></script>
<script src="../js/main.js"></script>
<script>
  initAdminData();
  let posts = getAdminData('blog', []);
  let deleteTarget = null;

  function renderBlog() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const data = q ? posts.filter(p => p.title.toLowerCase().includes(q) || (p.category||'').toLowerCase().includes(q)) : posts;
    const tbody = document.getElementById('blogTable');
    tbody.innerHTML = '';
    if (!data.length) {
      tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--gray-400)">Статей нет</td></tr>';
      return;
    }
    data.forEach(p => {
      const pub = p.published !== false;
      tbody.innerHTML += `
      <tr>
        <td style="color:var(--gray-400)">#${p.id}</td>
        <td style="font-size:1.5rem">${p.emoji||'📝'}</td>
        <td style="max-width:240px"><strong>${p.title}</strong><br><span style="font-size:.8rem;color:var(--gray-400)">${(p.excerpt||'').slice(0,50)}...</span></td>
        <td><span class="badge badge-green">${p.category||'—'}</span></td>
        <td style="font-size:.85rem">${p.date||'—'}</td>
        <td style="font-size:.85rem">⏱ ${p.readTime||'—'}</td>
        <td>
          <button class="badge ${pub?'badge-green':'badge-amber'}" onclick="togglePublish(${p.id})" style="cursor:pointer;border:none">
            ${pub?'✓ Опубликована':'⏸ Черновик'}
          </button>
        </td>
        <td>
          <div class="action-btns">
            <button class="btn-icon btn-icon-edit" onclick="editPost(${p.id})">✏️</button>
            <button class="btn-icon btn-icon-delete" onclick="openDeleteModal(${p.id})">🗑️</button>
          </div>
        </td>
      </tr>`;
    });
  }

  function openAddModal() {
    document.getElementById('blogModalTitle').textContent = 'Новая статья';
    document.getElementById('editId').value = '';
    document.getElementById('blogForm').reset();
    document.getElementById('bDate').value = new Date().toISOString().slice(0,10);
    document.getElementById('bPublished').checked = true;
    document.getElementById('blogModal').classList.add('open');
  }

  function editPost(id) {
    const p = posts.find(x=>x.id===id);
    if (!p) return;
    document.getElementById('blogModalTitle').textContent = 'Редактировать статью';
    document.getElementById('editId').value = id;
    document.getElementById('bTitle').value = p.title;
    document.getElementById('bEmoji').value = p.emoji||'';
    document.getElementById('bCategory').value = p.category||'Советы';
    document.getElementById('bReadTime').value = p.readTime||'';
    document.getElementById('bDate').value = p.date||'';
    document.getElementById('bExcerpt').value = p.excerpt||'';
    document.getElementById('bContent').value = p.content||'';
    document.getElementById('bPublished').checked = p.published !== false;
    document.getElementById('blogModal').classList.add('open');
  }

  function savePost() {
    const id = document.getElementById('editId').value;
    const data = {
      id: id ? parseInt(id) : Date.now(),
      title: document.getElementById('bTitle').value.trim(),
      emoji: document.getElementById('bEmoji').value.trim() || '📝',
      category: document.getElementById('bCategory').value,
      readTime: document.getElementById('bReadTime').value.trim(),
      date: document.getElementById('bDate').value,
      excerpt: document.getElementById('bExcerpt').value.trim(),
      content: document.getElementById('bContent').value.trim(),
      published: document.getElementById('bPublished').checked
    };
    if (!data.title || !data.excerpt) { showToast('Заполните обязательные поля','error'); return; }
    if (id) { const i=posts.findIndex(p=>p.id===parseInt(id)); if(i>=0) posts[i]=data; }
    else { posts.push(data); }
    setAdminData('blog',posts);
    renderBlog(); closeModal();
    showToast('✅ Статья сохранена');
  }

  function togglePublish(id) {
    const idx = posts.findIndex(p=>p.id===id);
    if (idx>=0) { posts[idx].published = !posts[idx].published; setAdminData('blog',posts); renderBlog(); }
  }

  function openDeleteModal(id) { deleteTarget=id; document.getElementById('deleteModal').classList.add('open'); }
  function closeDeleteModal() { deleteTarget=null; document.getElementById('deleteModal').classList.remove('open'); }
  function confirmDelete() {
    posts=posts.filter(p=>p.id!==deleteTarget);
    setAdminData('blog',posts);
    renderBlog(); closeDeleteModal();
    showToast('🗑️ Статья удалена');
  }
  function closeModal() { document.getElementById('blogModal').classList.remove('open'); }

  renderBlog();
</script>
</body>
</html>
